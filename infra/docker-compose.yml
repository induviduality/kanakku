services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: ${REDIS_URL}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      DEV_MODE: ${DEV_MODE:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8765 --workers 3
    deploy:
      resources:
        limits:
          memory: 512m

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m arq app.workers.settings.WorkerSettings
    deploy:
      resources:
        limits:
          memory: 512m

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_DEV_MODE: ${VITE_DEV_MODE:-}
        VITE_DEV_EMAIL: ${VITE_DEV_EMAIL:-dev@kanakku.com}
        VITE_DEV_PASSWORD: ${VITE_DEV_PASSWORD:-dev-password}
    restart: unless-stopped
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128m

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_PORT:-8081}:${CADDY_PORT:-8081}"
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-localhost}
      CADDY_PORT: ${CADDY_PORT:-8081}
    networks:
      - default
      - proxy-nw
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:

networks:
  default:
  proxy-nw:
