# ── Kanakku Backend · SonarQube project (local-only) ────────────────────────────
# Scanned from the backend/ directory. Separate dashboard from the frontend.
# Generate backend/coverage.xml first (scripts/quality.* coverage-backend).

sonar.projectKey=kanakku-backend
sonar.projectName=Kanakku Backend
sonar.projectVersion=0.1.0

sonar.sources=app
sonar.tests=tests
sonar.python.version=3.12
sonar.sourceEncoding=UTF-8

# Coverage (coverage.py XML, produced by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Keep boilerplate out of analysis / coverage math
sonar.exclusions=app/dev_seed.py
sonar.coverage.exclusions=app/dev_seed.py,app/cli.py

# Optional: import linter findings too (run scripts/quality.* lint-backend first)
#sonar.python.ruff.reportPaths=reports/ruff.json
#sonar.python.mypy.reportPaths=reports/mypy.txt
#sonar.python.bandit.reportPaths=reports/bandit.json
