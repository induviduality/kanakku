# ── Kanakku Frontend · SonarQube project (local-only) ───────────────────────────
# Scanned from the frontend/ directory. Separate dashboard from the backend.
# Generate frontend/coverage/lcov.info first (scripts/quality.* coverage-frontend).

sonar.projectKey=kanakku-frontend
sonar.projectName=Kanakku Frontend
sonar.projectVersion=0.1.0

sonar.sources=src
sonar.tests=src
sonar.sourceEncoding=UTF-8

# Tests are co-located in src/. Classify *.test.* / *.spec.* as tests and exclude
# them from "sources" so no file counts as both.
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx
sonar.exclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx,src/test/**,src/mocks/**

# Coverage (lcov, produced by vitest v8)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/main.tsx,src/router.tsx,src/**/*.config.ts

# Optional: import ESLint findings too (run scripts/quality.* lint-frontend first)
#sonar.eslint.reportPaths=reports/eslint.json
